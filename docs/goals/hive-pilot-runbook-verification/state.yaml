# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Hive Pilot Runbook And End-To-End Verification"
  slug: "hive-pilot-runbook-verification"
  kind: existing_plan
  tranche: "Add a repeatable verifier and runbook proving the installed Windows Bumblebee pilot can push fresh runs to Hive and show them through metadata-only operator visibility."
  status: done
  oracle:
    signal: "A verifier script can validate local install state, trigger direct or scheduled Bumblebee execution, and confirm a fresh completed Hive run using redacted admin visibility responses."
    cadence: "after each Worker package and at final audit"
    final_proof: "Passing tests/checks, redacted live CheckOnly and Scheduled verification receipts, updated docs, clean or committed repos, and final audit with full_outcome_complete: true."
  intake:
    original_request: "$goalbuddy:goal-prep after approving the Hive pilot runbook and end-to-end verification plan."
    interpreted_outcome: "Prepare a GoalBuddy board to implement and verify a repeatable operator proof loop for the existing per-user Bumblebee-to-Hive pilot."
    input_shape: existing_plan
    audience: "Hive/Bumblebee operators and maintainers."
    authority: approved
    proof_type: test
    completion_proof: "A verifier script, docs, and redacted live evidence prove a fresh local Bumblebee run lands in Hive and appears through admin metadata endpoints."
    likely_misfire: "Reinstalling or redesigning the scanner/receiver instead of proving and documenting the existing local install to Hive visibility path."
    blind_spots_considered:
      - "Verifier must not leak local identities, device IDs, secrets, raw inventory, raw paths, R2 keys, or summary_json."
      - "The current installed pilot may be valid; do not force a reinstall unless validation proves it is stale."
      - "Hive visibility is JSON-only and metadata-only; do not add a dashboard."
      - "Bumblebee scanner behavior should not change in this tranche."
    existing_plan_facts:
      - "Add scripts/verify-bumblebee-pilot.ps1 in the Hive repo."
      - "Support CheckOnly, Direct, and Scheduled modes."
      - "Default to the current per-user install/config roots and task name Bumblebee Baseline Pilot."
      - "Use DPAPI-protected local deployment secrets for Hive admin visibility checks."
      - "Update Hive README with pilot verification runbook."
      - "Update Bumblebee Windows deployment docs with a short pointer if useful."
      - "Update windows.md with a redacted receipt only after live verification."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  selected: local
  local:
    status: blocked
    url: null
    command: "npx goalbuddy board docs/goals/hive-pilot-runbook-verification"
    error: "GoalBuddy board command did not serve a local board; catalog fetch returned HTTP 404. File-backed board remains usable."

active_task: null

tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate the approved verifier/runbook plan against current Hive and Bumblebee state, then choose the first largest safe Worker package."
    inputs:
      - "docs/goals/hive-pilot-runbook-verification/goal.md"
      - "docs/goals/hive-pilot-runbook-verification/state.yaml"
      - "Approved plan from chat"
      - "Current Hive repo"
      - "Current Bumblebee repo"
      - "Current local per-user install and scheduled task state"
    constraints:
      - "Read-only."
      - "Do not implement."
      - "Do not print secrets, device IDs, usernames, SIDs, hostnames, raw paths, raw inventory, R2 keys, or summary_json."
      - "Reject scanner behavior changes unless implementation is impossible without them."
      - "Reject Hive API changes unless existing metadata endpoints cannot prove freshness."
    expected_output:
      - "Decision: approve | revise | block"
      - "Current-state facts that materially affect implementation"
      - "Exact first Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
    receipt:
      result: done
      decision: approve
      current_state_facts:
        - "Hive repo is on main tracking origin/main with only this GoalBuddy board untracked."
        - "Bumblebee repo is clean on windows/compat-layer tracking origin/windows/compat-layer."
        - "Per-user install root exists with bumblebee.exe."
        - "Per-user config root exists with config.json, run-baseline.ps1, and secrets.clixml."
      - "Config points at the pilot Hive /v1/ingest URL, has a device ID, profile baseline, and no explicit scan roots."
        - "Installed bumblebee.exe selftest exits 0."
        - "Scheduled task Bumblebee Baseline Pilot is present, Ready, points at the Roaming run-baseline.ps1 wrapper, and last result is 0."
        - "Local DPAPI-protected deployment secrets include Access client ID, Access client secret, and ADMIN_TOKEN."
        - "Existing Hive admin endpoints are sufficient for freshness proof by internally filtering runs by configured device_id and redacting all returned identifiers."
      exact_first_worker_objective: "Add scripts/verify-bumblebee-pilot.ps1 with CheckOnly, Direct, and Scheduled modes; make it emit redacted JSON only; validate script syntax and CheckOnly behavior."
      allowed_files:
        - "scripts/verify-bumblebee-pilot.ps1"
        - "docs/goals/hive-pilot-runbook-verification/state.yaml"
      verify:
        - "PowerShell parser check for scripts/verify-bumblebee-pilot.ps1"
        - "scripts/verify-bumblebee-pilot.ps1 -Mode CheckOnly"
        - "npm test"
        - "npm run typecheck"
        - "npm run lint"
        - "git diff --check"
      stop_if:
        - "Need to print or persist secrets, raw inventory, raw HTTP payloads, raw device IDs, usernames, SIDs, hostnames, full profile paths, R2 object keys, or summary_json."
        - "Need to re-run installer, disable device, revoke device, or uninstall local state."
        - "Need Hive API changes before a Judge validates the gap."
        - "Need Bumblebee scanner changes."

  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Implement the Hive pilot verifier script and focused local test/static checks selected by Judge."
    allowed_files:
      - "scripts/verify-bumblebee-pilot.ps1"
      - "docs/goals/hive-pilot-runbook-verification/state.yaml"
    verify:
      - "PowerShell parser check for scripts/verify-bumblebee-pilot.ps1"
      - "scripts/verify-bumblebee-pilot.ps1 -Mode CheckOnly"
      - "npm test"
      - "npm run typecheck"
      - "npm run lint"
      - "git diff --check"
    stop_if:
      - "Need to print or persist secrets, raw inventory, raw HTTP payloads, raw device IDs, usernames, SIDs, hostnames, full profile paths, R2 object keys, or summary_json."
      - "Need to re-run installer, disable device, revoke device, or uninstall local state."
      - "Need Hive API changes before a Judge validates the gap."
      - "Need Bumblebee scanner changes."
    receipt:
      result: done
      changed_files:
        - "scripts/verify-bumblebee-pilot.ps1"
        - "docs/goals/hive-pilot-runbook-verification/state.yaml"
      commands:
        - cmd: "PowerShell parser check for scripts/verify-bumblebee-pilot.ps1"
          status: pass
        - cmd: "scripts/verify-bumblebee-pilot.ps1 -Mode CheckOnly"
          status: pass
        - cmd: "npm test"
          status: pass
        - cmd: "npm run typecheck"
          status: pass
        - cmd: "npm run lint"
          status: pass
        - cmd: "git diff --check"
          status: pass
      summary: "Added a redacted pilot verifier with CheckOnly, Direct, and Scheduled modes. CheckOnly proves local install/config/task state, selftest, admin credentials presence, metadata endpoint reachability, no-store cache headers, and absence of forbidden field names without triggering a scan."

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Update Hive and Bumblebee operator documentation for the pilot verifier and redacted evidence flow."
    allowed_files:
      - "README.md"
      - "../bumblebee/docs/deployment-windows.md"
      - "../bumblebee/windows.md"
      - "docs/goals/hive-pilot-runbook-verification/goal.md"
      - "docs/goals/hive-pilot-runbook-verification/notes"
      - "docs/goals/hive-pilot-runbook-verification/state.yaml"
    verify:
      - "Hive repo npm test/typecheck/lint if script or docs require it"
      - "Bumblebee repo go test only if docs reference changed behavior"
      - "git diff --check in touched repos"
      - "rg check for raw org/private values in new docs/receipts"
    stop_if:
      - "Docs require real token, raw device ID, hostname, username, SID, or full local profile path values."
      - "Docs claim dashboard, raw inventory browsing, or new scanner support."
      - "Docs duplicate broad Bumblebee deployment guidance instead of linking to the right repo."
    receipt:
      result: done
      changed_files:
        - "README.md"
        - "../bumblebee/docs/deployment-windows.md"
        - "docs/goals/hive-pilot-runbook-verification/goal.md"
        - "docs/goals/hive-pilot-runbook-verification/state.yaml"
      commands:
        - cmd: "npm test"
          status: pass
        - cmd: "npm run typecheck"
          status: pass
        - cmd: "npm run lint"
          status: pass
        - cmd: "git diff --check in Hive repo"
          status: pass
        - cmd: "git diff --check in Bumblebee repo"
          status: pass
        - cmd: "rg raw private-value check in newly touched Hive docs/scripts"
          status: pass
        - cmd: "rg raw private-value check in touched Bumblebee deployment doc"
          status: pass
      summary: "Added Hive README pilot verification guidance for CheckOnly, Direct, and Scheduled verifier modes. Added a short generic pointer from Bumblebee Windows deployment docs to the Hive verifier. Redacted the GoalBuddy charter/state so the pilot hostname is not committed."

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Run redacted CheckOnly and Scheduled live verification, capture receipts, then commit and push changed repos."
    allowed_files:
      - "docs/goals/hive-pilot-runbook-verification/notes/T004-live-verification.md"
      - "docs/goals/hive-pilot-runbook-verification/state.yaml"
      - "../bumblebee/windows.md"
    verify:
      - "Verifier CheckOnly mode"
      - "Verifier Scheduled mode"
      - "Hive admin overview/devices/runs metadata responses contain no forbidden fields"
      - "git status is clean after commit/push or explicitly documented"
    stop_if:
      - "Cloudflare Access/admin secrets are unavailable."
      - "Running the scheduled task would expose raw inventory or secrets in logs."
      - "The existing pilot install is stale and requires installer repair before verification."
      - "Need second-machine pilot work."
    receipt:
      result: done
      changed_files:
        - "docs/goals/hive-pilot-runbook-verification/notes/T004-live-verification.md"
        - "docs/goals/hive-pilot-runbook-verification/state.yaml"
        - "../bumblebee/windows.md"
      commands:
        - cmd: "scripts/verify-bumblebee-pilot.ps1 -Mode CheckOnly"
          status: pass
        - cmd: "scripts/verify-bumblebee-pilot.ps1 -Mode Scheduled -WaitSeconds 300"
          status: pass
        - cmd: "Hive admin overview/devices/runs metadata forbidden-field checks"
          status: pass
        - cmd: "PowerShell parser check for scripts/verify-bumblebee-pilot.ps1"
          status: pass
        - cmd: "npm test"
          status: pass
        - cmd: "npm run typecheck"
          status: pass
        - cmd: "npm run lint"
          status: pass
        - cmd: "git diff --check in Hive repo"
          status: pass
        - cmd: "git diff --check in Bumblebee repo"
          status: pass
        - cmd: "GoalBuddy state checker"
          status: pass
      summary: "Captured redacted live evidence. CheckOnly proved local config/wrapper/secrets/binary/task state plus Hive metadata reachability. Scheduled triggered the pilot task, task last result was 0, and Hive showed a fresh complete run with zero forbidden field matches. Bumblebee windows.md now records the same redacted receipt."
      note: "notes/T004-live-verification.md"

  - id: T005
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Fix the verifier freshness timestamp bug found during Scheduled mode and rerun the T002/T004 verification gates."
    allowed_files:
      - "scripts/verify-bumblebee-pilot.ps1"
      - "docs/goals/hive-pilot-runbook-verification/state.yaml"
    verify:
      - "PowerShell parser check for scripts/verify-bumblebee-pilot.ps1"
      - "scripts/verify-bumblebee-pilot.ps1 -Mode CheckOnly"
      - "scripts/verify-bumblebee-pilot.ps1 -Mode Scheduled -WaitSeconds 300"
      - "npm test"
      - "npm run typecheck"
      - "npm run lint"
      - "git diff --check"
    stop_if:
      - "Need to print or persist secrets, raw inventory, raw HTTP payloads, raw device IDs, usernames, SIDs, hostnames, full profile paths, R2 object keys, or summary_json."
      - "Need to re-run installer, disable device, revoke device, or uninstall local state."
      - "Need Hive API or Bumblebee scanner changes."
    receipt:
      result: done
      changed_files:
        - "scripts/verify-bumblebee-pilot.ps1"
        - "docs/goals/hive-pilot-runbook-verification/state.yaml"
      commands:
        - cmd: "PowerShell parser check for scripts/verify-bumblebee-pilot.ps1"
          status: pass
        - cmd: "scripts/verify-bumblebee-pilot.ps1 -Mode CheckOnly"
          status: pass
        - cmd: "scripts/verify-bumblebee-pilot.ps1 -Mode Scheduled -WaitSeconds 300"
          status: pass
        - cmd: "npm test"
          status: pass
        - cmd: "npm run typecheck"
          status: pass
        - cmd: "npm run lint"
          status: pass
        - cmd: "git diff --check"
          status: pass
      summary: "Fixed the verifier freshness comparison so an absent previous run timestamp is handled safely. Reran CheckOnly and Scheduled mode; Scheduled triggered the task, last result was 0, and Hive showed a fresh complete run with no forbidden field matches."

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Audit whether the pilot verification tranche is complete and safe to use as an operator proof loop."
    inputs:
      - "All done task receipts"
      - "Last verification"
      - "Current dirty diff"
      - "Current Hive and Bumblebee repo status"
    constraints:
      - "Do not implement."
      - "Reject completion if required Worker work is still queued or active."
      - "Reject completion if receipts contain secrets, raw inventory, raw device IDs, usernames, SIDs, hostnames, full profile paths, R2 keys, or summary_json."
      - "Reject completion if live verification did not prove a fresh completed Hive run."
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "verification evidence"
      - "missing evidence"
      - "next task if not complete"
    receipt:
      result: done
      decision: complete
      full_outcome_complete: true
      verification_evidence:
        - "Verifier script exists and supports CheckOnly, Direct, and Scheduled modes."
        - "CheckOnly passed with local config/wrapper/secrets/binary/task checks, selftest exit code 0, admin endpoint 200/no-store responses, latest complete run, and zero forbidden field matches."
        - "Scheduled mode passed by triggering the pilot task, observing task completion with last result 0, and observing a fresh complete Hive run with zero forbidden field matches."
        - "Hive README documents pilot verification usage and troubleshooting."
        - "Bumblebee Windows deployment docs point to the Hive verifier without duplicating Hive-specific implementation details."
        - "windows.md contains a redacted live receipt with no secrets, raw inventory, raw device IDs, usernames, SIDs, hostnames, full profile paths, R2 keys, or summary_json."
        - "PowerShell parser check passed."
        - "npm test, npm run typecheck, npm run lint, git diff --check, and GoalBuddy state checker passed."
      missing_evidence: []
      summary: "The pilot verification tranche is complete. The repo now contains a repeatable redacted verifier/runbook for the existing Windows Bumblebee-to-Hive pilot, live proof shows a fresh scheduled run visible through Hive metadata-only endpoints, and no scanner behavior, Hive API surface, installer state, revoke/uninstall flow, dashboard, or raw inventory access was added."

checks:
  dirty_fingerprint: unknown
  last_verification:
    result: pass
    task: T999
    commands:
      - "PowerShell parser check for scripts/verify-bumblebee-pilot.ps1"
      - "scripts/verify-bumblebee-pilot.ps1 -Mode CheckOnly"
      - "scripts/verify-bumblebee-pilot.ps1 -Mode Scheduled -WaitSeconds 300"
      - "npm test"
      - "npm run typecheck"
      - "npm run lint"
      - "git diff --check in Hive repo"
      - "git diff --check in Bumblebee repo"
      - "GoalBuddy state checker"
