# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Hive Package Drill-Down"
  slug: "hive-package-drilldown"
  kind: existing_plan
  tranche: "Validate and implement a metadata-only package drill-down in the Hive admin UI."
  status: done
  oracle:
    signal: "A package row can be selected in the Hive admin UI, the selected package detail is recoverable from the URL, tests prove metadata-only API/UI behavior, and forbidden raw fields remain absent."
    cadence: "after each Worker package and at final audit"
    final_proof: "Passing tests/typecheck plus final audit mapping implementation and docs to the metadata-only drill-down oracle."
  intake:
    original_request: "Goal prep for the next Hive package drill-down plan."
    interpreted_outcome: "Hive admin operators can drill into package impact from inventory rows without exposing raw inventory data."
    input_shape: existing_plan
    audience: "Hive operators"
    authority: approved
    proof_type: test
    completion_proof: "API/UI tests pass, TypeScript passes, README is updated, and final audit confirms metadata-only recoverable drill-down behavior."
    likely_misfire: "Creating another broad inventory table or raw observation browser instead of a constrained metadata-only package detail flow."
    blind_spots_considered:
      - "URL recovery for selected package state."
      - "Forbidden raw-field leakage."
      - "Grouped version and affected-device display."
      - "Current-inventory-only semantics."
      - "Avoiding Take3-specific behavior."
    existing_plan_facts:
      - "Add package selection state to the admin UI URL."
      - "Add a package detail panel inside the Inventory section, not a new global page."
      - "Add parallel /v1/admin/* and /v1/ui/admin/* detail endpoints only if the current list endpoint is not sufficient."
      - "Use inventory_current and grouped metadata only."
      - "Do not expose raw paths, raw records, summary_json, R2 object keys, HMAC material, hostnames, usernames, SIDs, profile paths, or local filesystem details."
      - "Update README admin UI docs."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  selected: local
  local:
    status: blocked
    url: "http://goalbuddy.localhost:41737/hive-package-drilldown/"
    command: "npx goalbuddy board docs/goals/hive-package-drilldown"
    error: "Installed goalbuddy CLI failed before starting the board: catalog fetch returned HTTP 404."

active_task: null

tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate the package drill-down plan against the current Hive admin routes, UI state, tests, and metadata-only constraints."
    inputs:
      - "docs/goals/hive-package-drilldown/goal.md"
      - "public/admin/app.js"
      - "public/admin/index.html"
      - "public/admin/styles.css"
      - "src/index.ts"
      - "test/admin-url-state.test.ts"
      - "test/ingest.test.ts"
      - "README.md"
    constraints:
      - "Read-only."
      - "Do not implement."
      - "Keep Hive generic and metadata-only."
      - "Reject any approach that exposes raw inventory fields or requires Take3-specific behavior."
    expected_output:
      - "Decision: approve | revise | block."
      - "Endpoint approach: reuse existing list API or add package detail endpoints."
      - "Exact Worker objective."
      - "allowed_files."
      - "verify commands."
      - "stop_if conditions."
    receipt:
      result: done
      decision: approved
      endpoint_approach: "Add dedicated exact package detail endpoints under both /v1/admin/packages/detail and /v1/ui/admin/packages/detail."
      rationale: "The existing package list routes are fuzzy, table/page oriented, and can select multiple package families. The drill-down oracle requires exact recoverable package selection with versions and affected devices while preserving metadata-only output."
      worker_objective: "Implement a metadata-only package detail API and admin UI panel with URL-recoverable selected package state."
      allowed_files:
        - "src/index.ts"
        - "public/admin/index.html"
        - "public/admin/app.js"
        - "public/admin/styles.css"
        - "test/ingest.test.ts"
        - "test/admin-url-state.test.ts"
        - "README.md"
      verify:
        - "npm test"
        - "npm run typecheck"
      stop_if:
        - "Need a D1 migration or schema change."
        - "Need files outside allowed_files."
        - "The design would expose forbidden raw fields."
        - "URL-state behavior is ambiguous."
        - "Verification fails twice for the same reason."

  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Implement the Judge-approved metadata-only package drill-down slice."
    allowed_files:
      - "src/index.ts"
      - "public/admin/index.html"
      - "public/admin/app.js"
      - "public/admin/styles.css"
      - "test/ingest.test.ts"
      - "test/admin-url-state.test.ts"
      - "README.md"
    verify:
      - "npm test"
      - "npm run typecheck"
    stop_if:
      - "Need a D1 migration or schema change not approved by Judge."
      - "Need files outside allowed_files."
      - "The design would expose forbidden raw fields."
      - "URL-state behavior is ambiguous."
      - "Verification fails twice for the same reason."
    receipt:
      result: done
      changed_files:
        - "src/index.ts"
        - "public/admin/index.html"
        - "public/admin/app.js"
        - "public/admin/styles.css"
        - "test/ingest.test.ts"
        - "test/admin-url-state.test.ts"
        - "README.md"
      commands:
        - cmd: "npm.cmd test"
          status: pass
          summary: "3 test files passed; 45 tests passed."
        - cmd: "npm.cmd run typecheck"
          status: pass
          summary: "tsc --noEmit passed."
        - cmd: "git diff --check"
          status: pass
          summary: "No whitespace errors; Git reported existing CRLF normalization warnings only."
      summary: "Added exact metadata-only package detail endpoints, URL-recoverable package selection, an in-page Inventory detail panel, explicit device navigation buttons, README endpoint/docs coverage, and API/UI tests."

  - id: T003
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Review the implemented drill-down for correctness, maintainability, metadata-only safety, and test coverage."
    inputs:
      - "T002 receipt"
      - "Current diff"
      - "Test output"
    constraints:
      - "Read-only."
      - "Do not implement."
      - "Do not call the tranche complete unless the UI, API, docs, and tests all map back to the oracle."
    expected_output:
      - "Decision: accept | request_changes | block."
      - "Safety assessment for forbidden raw fields."
      - "Maintenance risk assessment."
      - "Any required follow-up Worker task."
    receipt:
      result: done
      decision: accept
      safety_assessment: "Package detail responses are built from current normalized package rows but return only package, version, affected-device, source-category, count, and observed-time metadata. Tests assert forbidden raw fields remain absent."
      maintenance_risk: "Moderate-low. The feature follows existing admin route separation, URL-state patterns, and current inventory formatting helpers; no migration or Take3-specific behavior was added."
      required_follow_up_worker_task: null

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Audit whether the package drill-down tranche is complete."
    inputs:
      - "All done task receipts"
      - "Last verification"
      - "Current dirty diff"
      - "docs/goals/hive-package-drilldown/goal.md"
    constraints:
      - "Do not implement."
      - "Reject completion if required Worker work is still queued or active."
      - "Reject completion if package drill-down is not recoverable through URL state."
      - "Reject completion if forbidden raw fields are exposed."
      - "Reject completion if docs or tests are missing."
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "missing evidence"
      - "next task if not complete"
    receipt:
      result: done
      decision: complete
      full_outcome_complete: true
      evidence:
        - "src/index.ts exposes /v1/admin/packages/detail and /v1/ui/admin/packages/detail with exact name/ecosystem matching."
        - "public/admin/app.js persists selected_package, selected_ecosystem, selected_profile, and selected_device URL state and renders package versions plus affected devices."
        - "test/ingest.test.ts covers exact package detail, UI Access detail, fuzzy miss behavior, and forbidden raw-field absence."
        - "test/admin-url-state.test.ts covers selected package URL hydration, push, and clear behavior."
        - "README.md documents the drill-down URL state and API endpoint."
        - "npm.cmd test passed: 3 files, 45 tests."
        - "npm.cmd run typecheck passed."
        - "git diff --check passed with only CRLF normalization warnings."
      missing_evidence: []
      next_task_if_not_complete: null

checks:
  dirty_fingerprint: "implementation diff present in allowed files plus docs/goals/hive-package-drilldown control files"
  last_verification:
    result: pass
    task: T002
    commands:
      - "npm.cmd test"
      - "npm.cmd run typecheck"
      - "git diff --check"
