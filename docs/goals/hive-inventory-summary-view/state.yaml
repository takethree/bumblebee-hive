# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Hive Inventory Summary View"
  slug: "hive-inventory-summary-view"
  kind: existing_plan
  tranche: "Make Hive inventory package APIs and admin UI default to deduped package summaries while preserving explicit observation-level troubleshooting."
  status: done
  oracle:
    signal: "The admin inventory view shows one summary row per device/profile/ecosystem/package/version with occurrence/source summaries, and explicit observation mode still returns individual rows."
    cadence: "after each Worker package and at final audit"
    final_proof: "Passing tests/typecheck/lint, Wrangler dry-runs, docs, data-minimization checks, and redacted smoke evidence for summary and observation package API modes."
  intake:
    original_request: "$goalbuddy:goal-prep after the deduped inventory view plan."
    interpreted_outcome: "Prepare a board to replace noisy duplicate-looking package observation rows with a default rolled-up summary view."
    input_shape: existing_plan
    audience: "Hive operators and maintainers."
    authority: approved
    proof_type: test
    completion_proof: "Package APIs and UI default to summary rows, observation view remains explicit, tests prove grouping and auth/data-minimization behavior, and deploy/smoke evidence is recorded."
    likely_misfire: "Suppress duplicates by deleting observation data or grouping across device/profile/ecosystem/version boundaries."
    blind_spots_considered:
      - "Observation rows remain valuable for troubleshooting and should not be removed."
      - "Summary grouping must not merge different versions, profiles, ecosystems, or devices."
      - "Source explanations must use source categories only, not raw paths."
      - "The previous normalized-inventory work is currently uncommitted and must be preserved."
      - "Live proof should not print package names if receipts can use aggregate evidence instead."
    existing_plan_facts:
      - "Default package API view should be view=summary."
      - "Explicit view=observations should preserve current row-level behavior."
      - "Summary grouping key: device_id, profile, ecosystem, normalized_name, version."
      - "Summary fields include occurrence_count and unique package_managers/source_types/root_kinds."
      - "UI should show occurrences and compact source summaries."
      - "Do not expose raw source_file or project_path."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  selected: local
  local:
    status: blocked
    url: "http://goalbuddy.localhost:41737/hive-inventory-summary-view/"
    command: "npx goalbuddy board docs/goals/hive-inventory-summary-view"
    error: "Local board was not started during prep because GoalBuddy update check could not find npm. File-backed board remains usable."

active_task: null

tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate the summary-view plan against the current uncommitted normalized-inventory implementation, then choose the largest safe Worker package."
    inputs:
      - "docs/goals/hive-inventory-summary-view/goal.md"
      - "docs/goals/hive-inventory-summary-view/state.yaml"
      - "Current Hive repo, including uncommitted normalized-inventory changes"
      - "Approved plan from chat"
      - "Previous completed board docs/goals/hive-normalized-inventory/state.yaml"
    constraints:
      - "Read-only."
      - "Do not implement."
      - "Do not print raw payloads, live device IDs, package names from live data, hostnames, usernames, SIDs, source paths, project paths, object keys, secrets, HMAC material, or summary_json."
      - "Reject any approach that deletes observation data or changes Bumblebee scanner output semantics."
      - "Reject any approach that exposes raw path fields."
    expected_output:
      - "Decision: approve | revise | block"
      - "Current-state facts that materially affect implementation"
      - "Exact first Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
      - "Any task replacements needed before Worker execution"
    receipt:
      result: done
      decision: approve
      current_state_facts:
        - "The uncommitted normalized-inventory implementation already exposes package APIs from inventory_current and does not expose source_file or project_path."
        - "inventory_current includes the required summary grouping key: device_id, profile, ecosystem, normalized_name, and version."
        - "inventory_current also includes safe category fields for package_manager, source_type, root_kind, direct_dependency, has_lifecycle_scripts, observed_at, and run_id."
        - "The current UI calls package APIs without a view parameter and renders observation rows, which explains duplicate-looking visible rows."
        - "The in-memory Vitest D1 harness has one inventory_current query path and can be extended to emulate grouped summary queries."
        - "No schema migration, data deletion, Bumblebee scanner change, or raw path exposure is needed for the summary-view tranche."
      exact_first_worker_objective: "Implement the full local summary-view package: package APIs default to view=summary with one row per device/profile/ecosystem/package/version, explicit view=observations preserves row-level current observations, admin UI renders occurrence/source summaries by default, README documents both modes, and tests verify grouping, auth split, and forbidden-field minimization."
      allowed_files:
        - "src/index.ts"
        - "test/ingest.test.ts"
        - "public/admin/index.html"
        - "public/admin/app.js"
        - "public/admin/styles.css"
        - "README.md"
        - "docs/goals/hive-inventory-summary-view/state.yaml"
        - "docs/goals/hive-inventory-summary-view/notes"
      verify:
        - "npm test"
        - "npm run typecheck"
        - "npm run lint"
        - "node --check public/admin/app.js"
        - "npx wrangler deploy --config wrangler.toml --dry-run"
        - "npx wrangler deploy --config wrangler.deploy.toml --dry-run"
        - "git diff --check"
        - "GoalBuddy state checker"
      stop_if:
        - "Need files outside allowed_files."
        - "Need to expose raw payloads, live package names in receipts, hostnames, usernames, SIDs, full source paths, project paths, object keys, secrets, HMAC material, or summary_json."
        - "Need to delete observation data or change Bumblebee scanner output semantics."
        - "Need destructive migration or data deletion."
        - "Verification fails twice for the same reason."
      summary: "Approved the existing plan as a single bounded local vertical slice. The summary view can be implemented from inventory_current with no schema or scanner changes."

  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Execute the first summary-view implementation package selected by Judge."
    allowed_files:
      - "src/index.ts"
      - "test/ingest.test.ts"
      - "public/admin/index.html"
      - "public/admin/app.js"
      - "public/admin/styles.css"
      - "README.md"
      - "docs/goals/hive-inventory-summary-view/state.yaml"
      - "docs/goals/hive-inventory-summary-view/notes"
    verify:
      - "npm test"
      - "npm run typecheck"
      - "npm run lint"
      - "node --check public/admin/app.js"
      - "npx wrangler deploy --config wrangler.toml --dry-run"
      - "npx wrangler deploy --config wrangler.deploy.toml --dry-run"
      - "git diff --check"
      - "GoalBuddy state checker"
    stop_if:
      - "Need files outside allowed_files."
      - "Need to expose raw payloads, live package names in receipts, hostnames, usernames, SIDs, full source paths, project paths, object keys, secrets, HMAC material, or summary_json."
      - "Need to delete observation data or change Bumblebee scanner output semantics."
      - "Need destructive migration or data deletion."
      - "Verification fails twice for the same reason."
    receipt:
      result: done
      changed_files:
        - "src/index.ts"
        - "test/ingest.test.ts"
        - "public/admin/index.html"
        - "public/admin/app.js"
        - "README.md"
        - "docs/goals/hive-inventory-summary-view/state.yaml"
      commands:
        - cmd: "npm test"
          status: pass
          note: "36 tests passed."
        - cmd: "npm run typecheck"
          status: pass
        - cmd: "npm run lint"
          status: pass
        - cmd: "node --check public/admin/app.js"
          status: pass
        - cmd: "npx wrangler deploy --config wrangler.toml --dry-run"
          status: pass
        - cmd: "npx wrangler deploy --config wrangler.deploy.toml --dry-run"
          status: pass
        - cmd: "git diff --check"
          status: pass
          note: "Only CRLF conversion warnings."
        - cmd: "GoalBuddy state checker"
          status: pass
      summary: "Implemented the local summary-view package. Package APIs now default to view=summary grouped by device/profile/ecosystem/package/version, explicit view=observations preserves row-level current observations, the admin UI renders occurrence counts and source-category summaries, README documents both modes, and regression tests prove grouping plus data minimization."

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Deploy and smoke the summary-view package if T002 changes production behavior."
    allowed_files:
      - "docs/goals/hive-inventory-summary-view/state.yaml"
      - "docs/goals/hive-inventory-summary-view/notes"
    verify:
      - "npx wrangler deploy --config wrangler.deploy.toml"
      - "Redacted live smoke for /admin/app.js, /v1/admin/packages?view=summary, /v1/admin/packages?view=observations, and /v1/ui/admin/packages?view=summary when credentials and pilot data are available"
      - "GoalBuddy state checker"
    stop_if:
      - "Need files outside allowed_files."
      - "Need live smoke output that exposes package names, raw payloads, hostnames, usernames, SIDs, full source paths, project paths, object keys, secrets, HMAC material, or summary_json."
      - "Need destructive migration or data deletion."
      - "Verification fails twice for the same reason."
    receipt:
      result: done
      changed_files:
        - "docs/goals/hive-inventory-summary-view/state.yaml"
      commands:
        - cmd: "npx wrangler deploy --config wrangler.deploy.toml"
          status: pass
          note: "Worker version d0e2393e-80cc-43ce-aed9-7a46e617f209; output confirmed schedule plus queue producer and consumer triggers."
        - cmd: "Redacted live package API smoke"
          status: pass
          note: "/admin/app.js returned 200 and contained summary UI code; admin summary packages returned 200/no-store with 100 rows and max occurrence count 4; admin observation packages returned 200/no-store with 100 rows; summary row count was not larger than observation row count; forbidden field counts were zero."
      summary: "Deployed the summary-view Worker bundle and proved the live package API default/observation modes with redacted aggregate evidence."

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Audit whether the inventory summary view tranche is complete and safe."
    inputs:
      - "All done task receipts"
      - "Last verification"
      - "Current dirty diff"
      - "Current Hive repo status"
    constraints:
      - "Do not implement."
      - "Reject completion if required Worker work is still queued or active."
      - "Reject completion if package APIs/UI do not default to summary rows."
      - "Reject completion if observation mode is unavailable."
      - "Reject completion if responses or receipts expose forbidden raw, path, identity, or secret fields."
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "verification evidence"
      - "missing evidence"
      - "next task if not complete"
    receipt:
      result: done
      decision: complete
      full_outcome_complete: true
      verification_evidence:
        - "Package API default view is view=summary and rejects unknown views."
        - "Summary grouping is one row per device_id, profile, ecosystem, normalized_name, and version."
        - "Summary responses include occurrence_count, latest observation fields, and unique package manager/source type/root kind category arrays."
        - "Explicit view=observations preserves the previous row-level current package observation output."
        - "Admin UI inventory tables render occurrences and source-category summaries by default."
        - "README documents summary default behavior and observation troubleshooting mode."
        - "Tests cover default summary output, deduped grouping, explicit observation mode, UI auth routes, and forbidden-field minimization."
        - "npm test, npm run typecheck, npm run lint, node --check public/admin/app.js, both Wrangler dry-runs, git diff --check, and GoalBuddy state checker passed."
        - "Worker deploy succeeded as version d0e2393e-80cc-43ce-aed9-7a46e617f209."
        - "Redacted live smoke proved /admin/app.js has summary UI code; admin summary and observation package endpoints returned 200/no-store; summary max occurrence count was 4; forbidden field counts were zero."
      missing_evidence: []
      summary: "The inventory summary view tranche is complete. Hive now defaults operator inventory APIs and UI to deduped package summaries while preserving explicit observation-level troubleshooting, and the behavior is verified locally plus live without exposing forbidden raw fields."

checks:
  dirty_fingerprint: unknown
  last_verification:
    result: pass
    task: T999
    commands:
      - "npm test"
      - "npm run typecheck"
      - "npm run lint"
      - "node --check public/admin/app.js"
      - "npx wrangler deploy --config wrangler.toml --dry-run"
      - "npx wrangler deploy --config wrangler.deploy.toml --dry-run"
      - "npx wrangler deploy --config wrangler.deploy.toml"
      - "Redacted live package API smoke"
      - "git diff --check"
      - "GoalBuddy state checker"
