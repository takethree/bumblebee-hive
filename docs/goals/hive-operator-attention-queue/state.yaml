# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Hive Operator Attention Queue"
  slug: "hive-operator-attention-queue"
  kind: existing_plan
  tranche: "Implement a metadata-only operator attention queue for Hive."
  status: done
  oracle:
    signal: "Hive exposes a server-computed, pipeline-only, metadata-only attention queue in API and UI, with filters, pagination, URL recovery, tests, docs, and no forbidden raw fields."
    cadence: "after each Worker package and at final audit"
    final_proof: "Passing tests/typecheck plus final audit mapping implementation and docs to the attention-queue oracle."
  intake:
    original_request: "Goal prep for the Hive operator attention queue plan."
    interpreted_outcome: "Hive operators can immediately see active devices needing action without manually correlating health, runs, and normalization panels."
    input_shape: existing_plan
    audience: "Hive operators"
    authority: approved
    proof_type: test
    completion_proof: "API/UI tests pass, TypeScript passes, README is updated, and final audit confirms metadata-only attention behavior."
    likely_misfire: "Building broad inventory anomaly scoring, workflow actions, or client-only correlation instead of a read-only server-computed pipeline attention queue."
    blind_spots_considered:
      - "Attention computation should be reusable by scripts and UI."
      - "Disabled devices should not appear in attention."
      - "Processing jobs need a bounded stale threshold."
      - "URL recovery should preserve attention filters independently from other tables."
      - "Response minimization must be re-validated."
      - "Remote migration and deploy are separate explicit steps."
    existing_plan_facts:
      - "Compute attention server-side."
      - "Keep scope pipeline-only."
      - "Place the panel at the top of the admin dashboard."
      - "Add /v1/admin/attention and /v1/ui/admin/attention."
      - "Support severity=all|critical|warning, reason, limit, and offset filters."
      - "Return config, counts, attention rows, and pagination metadata."
      - "Reasons include latest_run_not_complete, latest_complete_run_too_old, no_monitored_profile_run, normalization_missing, normalization_error, normalization_processing_stale, and normalization_not_promoted."
      - "Add NORMALIZATION_PROCESSING_STALE_MINUTES with default 30."
      - "Add additive D1 index normalization_jobs(device_id, run_id, started_at DESC)."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  selected: local
  local:
    status: started
    url: "http://goalbuddy.localhost:41737/hive-operator-attention-queue/"
    command: "node C:\\Users\\bbutner\\.codex\\plugins\\cache\\goalbuddy\\goalbuddy\\0.3.7\\skills\\goalbuddy\\surfaces\\local-goal-board\\scripts\\local-goal-board.mjs --goal docs\\goals\\hive-operator-attention-queue"

active_task: null

tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate the attention queue plan against current Hive routes, schema, health logic, normalization logic, UI state, tests, migration conventions, and metadata-only constraints."
    inputs:
      - "docs/goals/hive-operator-attention-queue/goal.md"
      - "src/index.ts"
      - "migrations"
      - "public/admin/app.js"
      - "public/admin/index.html"
      - "public/admin/styles.css"
      - "test/ingest.test.ts"
      - "test/admin-url-state.test.ts"
      - "README.md"
    constraints:
      - "Read-only."
      - "Do not implement."
      - "Keep Hive generic and metadata-only."
      - "Reject retry/replay/delete/queue mutation or raw batch inspection."
      - "Reject package/inventory anomaly scoring for this tranche."
      - "Reject any approach that exposes raw inventory fields, object keys, hostnames, usernames, SIDs, local paths, HMAC material, Access credentials, or Take3-specific behavior."
    expected_output:
      - "Decision: approve | revise | block."
      - "Exact endpoint and UI approach."
      - "Exact attention reason and severity mapping."
      - "Whether a D1 index migration is required."
      - "Exact Worker objective."
      - "allowed_files."
      - "verify commands."
      - "stop_if conditions."
    receipt:
      note: "notes/t001-judge.md"
      result: done
      decision: approve
      summary: "Approved a server-computed, metadata-only vertical attention queue slice with explicit severity mapping, normalization rules, migration, UI URL state, allowed files, and verification commands."

  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Execute the Judge-approved metadata-only attention queue implementation slice."
    allowed_files:
      - "src/index.ts"
      - "migrations/0007_attention_queue_indexes.sql"
      - "public/admin/index.html"
      - "public/admin/app.js"
      - "public/admin/styles.css"
      - "test/ingest.test.ts"
      - "test/admin-url-state.test.ts"
      - "README.md"
    verify:
      - "npm.cmd test"
      - "npm.cmd run typecheck"
      - "git diff --check"
    stop_if:
      - "Need files outside allowed_files."
      - "Need a destructive migration or production data deletion."
      - "The design would expose forbidden raw fields or object keys."
      - "The implementation would mutate queue/jobs/devices rather than providing read-only visibility."
      - "Attention classification behavior is ambiguous after Judge validation."
      - "Verification fails twice for the same reason."
    receipt:
      note: "notes/t002-worker.md"
      result: done
      summary: "Implemented the metadata-only attention API/UI slice, migration, tests, docs, and verified typecheck/test/diff-check."
      changed_files:
        - "src/index.ts"
        - "migrations/0007_attention_queue_indexes.sql"
        - "public/admin/index.html"
        - "public/admin/app.js"
        - "public/admin/styles.css"
        - "test/ingest.test.ts"
        - "test/admin-url-state.test.ts"
        - "README.md"
      commands:
        - command: "npm.cmd run typecheck"
          status: pass
        - command: "npm.cmd test"
          status: pass
        - command: "git diff --check"
          status: pass

  - id: T003
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Review the implemented attention queue for correctness, maintainability, metadata-only safety, and test coverage."
    inputs:
      - "T002 receipt"
      - "Current diff"
      - "Test output"
    constraints:
      - "Read-only."
      - "Do not implement."
      - "Do not call the tranche complete unless API, UI, docs, tests, and migration all map back to the oracle."
    expected_output:
      - "Decision: accept | request_changes | block."
      - "Safety assessment for forbidden raw fields."
      - "Attention reason/severity assessment."
      - "Migration safety assessment."
      - "Maintenance risk assessment."
      - "Any required follow-up Worker task."
    receipt:
      note: "notes/t003-judge.md"
      result: done
      decision: accept
      summary: "Accepted the implementation after reviewing route split, read-only behavior, metadata minimization, migration safety, UI state, docs, and verification output."

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Audit whether the attention queue tranche is complete."
    inputs:
      - "All done task receipts"
      - "Last verification"
      - "Current dirty diff"
      - "docs/goals/hive-operator-attention-queue/goal.md"
    constraints:
      - "Do not implement."
      - "Reject completion if required Worker work is still queued or active."
      - "Reject completion if attention visibility is not metadata-only."
      - "Reject completion if retry/replay/delete/queue mutation was added."
      - "Reject completion if docs, tests, or migration coverage are missing."
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "missing evidence"
      - "next task if not complete"
    receipt:
      note: "notes/t999-final-audit.md"
      result: done
      decision: complete
      full_outcome_complete: true
      verification_evidence:
        - "src/index.ts implements GET /v1/admin/attention and GET /v1/ui/admin/attention with the existing script admin and Access JWT route split."
        - "Attention response includes config, counts, attention rows, pagination metadata, and filters."
        - "public/admin/index.html and public/admin/app.js render the top Attention panel above Health with severity, reason, row-count, and pagination URL state."
        - "migrations/0007_attention_queue_indexes.sql adds normalization_jobs(device_id, run_id, started_at DESC)."
        - "README documents the endpoint, operator behavior, config, reason mapping, response example, and verifier expectations."
        - "Tests cover incomplete runs, stale complete runs, missing normalization, error normalization, stale processing normalization, not-promoted normalization, UI auth route, disabled-device exclusion, metadata minimization, pagination, and URL recovery."
        - "npm.cmd run typecheck, npm.cmd test, git diff --check, and GoalBuddy state checker passed."
      missing_evidence: []
      summary: "The Hive operator attention queue tranche is complete locally. It adds a metadata-only, read-only, server-computed attention queue in API and UI with docs, migration, URL recovery, and tests."

