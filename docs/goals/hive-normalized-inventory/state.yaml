# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Hive Normalized Inventory V1"
  slug: "hive-normalized-inventory"
  kind: existing_plan
  tranche: "Normalize accepted Bumblebee inventory batches into queryable Hive D1 package/finding/current-state data and expose controlled operator inventory views."
  status: done
  oracle:
    signal: "Hive can answer package search, per-device package inventory, and devices-with-package questions from normalized D1 data without exposing raw payloads or secrets."
    cadence: "after each Worker package and at final audit"
    final_proof: "Passing tests/typecheck/lint, migration/deploy validation, docs, data-minimization checks, and redacted smoke evidence that a fresh pilot run becomes queryable."
  intake:
    original_request: "$goalbuddy:goal-prep after the Hive normalized inventory plan."
    interpreted_outcome: "Prepare a board to implement normalized package/finding/current-state inventory for Hive from accepted Bumblebee batches."
    input_shape: existing_plan
    audience: "Hive/Bumblebee operators and maintainers."
    authority: approved
    proof_type: test
    completion_proof: "Normalized tables, queue consumer, admin/UI package APIs, UI inventory views, docs, and verification prove useful inventory questions are answerable safely."
    likely_misfire: "Expose raw inventory/path-heavy payloads or ignore Bumblebee complete-run promotion semantics."
    blind_spots_considered:
      - "Cloudflare Queues can deliver duplicate messages; normalization must be idempotent."
      - "Current state must not be promoted from partial/error/missing-summary runs."
      - "Deep profile data must not retire baseline/project current state."
      - "Operator usefulness requires package search and per-device package visibility, not only internal tables."
      - "This deliberately expands beyond previous metadata-only admin views, so response minimization must be re-validated."
    existing_plan_facts:
      - "Normalize package and finding records from accepted raw R2 batches."
      - "Use NORMALIZE_QUEUE as the processing trigger."
      - "Keep raw batches in R2 as source of truth."
      - "Promote current state only from complete scan summaries."
      - "Expose package search and device package lists through admin and UI routes."
      - "Add a simple inventory view to the admin UI."
      - "Do not build AI provisioning, vulnerability enrichment, settings management, or Bumblebee scanner changes in this tranche."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  selected: local
  local:
    status: blocked
    url: "http://goalbuddy.localhost:41737/hive-normalized-inventory/"
    command: "npx goalbuddy board docs/goals/hive-normalized-inventory"
    error: "Local board was not started during prep because npx/npm is unavailable on PATH in this shell. File-backed board remains usable."

active_task: null

tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate the normalized inventory plan against current Hive and Bumblebee state, then choose the largest safe first Worker package."
    inputs:
      - "docs/goals/hive-normalized-inventory/goal.md"
      - "docs/goals/hive-normalized-inventory/state.yaml"
      - "Current Hive repo"
      - "Current Bumblebee docs/state-model.md and emitted record schema"
      - "Approved plan from chat"
    constraints:
      - "Read-only."
      - "Do not implement."
      - "Do not print raw payloads, device IDs from live data, hostnames, usernames, SIDs, source paths, project paths, object keys, secrets, HMAC material, or summary_json."
      - "Reject any plan that changes Bumblebee scanner output semantics."
      - "Reject any plan that exposes raw inventory or path-heavy payloads through operator routes."
      - "Preserve existing admin-token and UI Access JWT separation."
    expected_output:
      - "Decision: approve | revise | block"
      - "Current-state facts that materially affect implementation"
      - "Exact first Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
      - "Any task replacements needed before Worker execution"
    receipt:
      result: done
      decision: approve
      current_state_facts:
        - "Hive already stores accepted raw batches in R2, writes batch/run metadata to D1, and sends {device_id, run_id, batch_id} to NORMALIZE_QUEUE."
        - "Hive has no queue consumer and no normalized package, current-state, or finding tables yet."
        - "Bumblebee docs/state-model.md defines the receiver promotion rule: only complete scan summaries promote current state; partial/error/missing-summary runs do not remove current state."
        - "Bumblebee emitted package/finding records include enough normalized package fields for useful operator package search without exposing raw payload JSON."
        - "Existing admin route split is suitable: /v1/admin/* requires Access plus X-Hive-Admin-Token; /v1/ui/admin/* uses browser Access JWT only."
        - "The current Vitest in-memory D1/R2 harness can be extended to prove idempotence, auth separation, data minimization, and UI inventory route behavior."
      exact_first_worker_objective: "Implement a full local normalized inventory vertical slice: additive D1 migration, queue consumer, package/finding/current-state normalization, controlled admin/UI inventory APIs, simple admin UI inventory surfaces, README documentation, and local verification."
      allowed_files:
        - "src/index.ts"
        - "migrations/0005_normalized_inventory.sql"
        - "test/ingest.test.ts"
        - "public/admin/index.html"
        - "public/admin/app.js"
        - "public/admin/styles.css"
        - "README.md"
        - "docs/goals/hive-normalized-inventory/state.yaml"
        - "docs/goals/hive-normalized-inventory/notes"
      verify:
        - "npm test"
        - "npm run typecheck"
        - "npm run lint"
        - "npx wrangler deploy --config wrangler.toml --dry-run"
        - "npx wrangler deploy --config wrangler.deploy.toml --dry-run"
        - "git diff --check"
        - "GoalBuddy state checker"
      stop_if:
        - "Need to expose raw payload JSON, summary_json, object_key, body_sha256, HMAC material, Access secrets, enrollment tokens, hostnames, usernames, SIDs, full source paths, project paths, or local profile paths through operator responses."
        - "Need a destructive migration or live data deletion."
        - "Need to change Bumblebee scanner output semantics."
        - "Wrangler/npm are unavailable and no equivalent local verification can prove the Worker package."
      summary: "Approved the plan and selected a single useful local vertical slice rather than tiny helper tasks. Defer live migration/deploy/smoke to the next task after local implementation is verified."

  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Implement the full local normalized inventory vertical slice selected by Judge."
    allowed_files:
      - "src/index.ts"
      - "migrations/0005_normalized_inventory.sql"
      - "test/ingest.test.ts"
      - "public/admin/index.html"
      - "public/admin/app.js"
      - "public/admin/styles.css"
      - "README.md"
      - "docs/goals/hive-normalized-inventory/state.yaml"
      - "docs/goals/hive-normalized-inventory/notes"
    verify:
