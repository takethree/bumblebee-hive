      - "npm run typecheck"
      - "npm run lint"
      - "npx wrangler deploy --config wrangler.toml --dry-run"
      - "npx wrangler deploy --config wrangler.deploy.toml --dry-run"
      - "git diff --check"
      - "GoalBuddy state checker"
    stop_if:
      - "Need files outside allowed_files."
      - "Need to expose raw payloads, hostnames, usernames, SIDs, full source paths, project paths, object keys, secrets, HMAC material, or summary_json."
      - "Need to change Bumblebee scanner output semantics."
      - "Need destructive migration or data deletion."
      - "Verification fails twice for the same reason."
    receipt:
      result: done
      changed_files:
        - "src/index.ts"
        - "migrations/0005_normalized_inventory.sql"
        - "test/ingest.test.ts"
        - "public/admin/index.html"
        - "public/admin/app.js"
        - "public/admin/styles.css"
        - "README.md"
        - "docs/goals/hive-normalized-inventory/state.yaml"
      commands:
        - cmd: "npm test"
          status: pass
          note: "35 tests passed."
        - cmd: "npm run typecheck"
          status: pass
        - cmd: "npm run lint"
          status: pass
        - cmd: "node --check public/admin/app.js"
          status: pass
