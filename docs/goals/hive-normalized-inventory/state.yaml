        - "docs/goals/hive-normalized-inventory/notes/T003-live-validation.md"
      commands:
        - cmd: "npx wrangler d1 migrations apply bumblebee-hive --remote --config wrangler.deploy.toml"
          status: pass
          note: "Applied 0005_normalized_inventory.sql."
        - cmd: "npx wrangler deploy --config wrangler.deploy.toml"
          status: pass
          note: "Worker version b29311b4-3544-4aed-8d37-2f8e8ef67e9c; output confirmed queue producer and consumer triggers."
        - cmd: "scripts/verify-bumblebee-pilot.ps1 -Mode Scheduled -WaitSeconds 300"
          status: pass
          note: "Fresh complete pilot run observed with zero forbidden matches in existing metadata endpoints."
        - cmd: "Redacted live package API smoke"
          status: pass
          note: "/admin/ and /admin/app.js returned 200; admin packages returned 200/no-store with package count greater than zero; UI packages returned 200; forbidden field counts were zero."
        - cmd: "npm test"
          status: pass
          note: "35 tests passed."
        - cmd: "npm run typecheck"
          status: pass
        - cmd: "npm run lint"
          status: pass
        - cmd: "npx wrangler deploy --config wrangler.toml --dry-run"
          status: pass
        - cmd: "npx wrangler deploy --config wrangler.deploy.toml --dry-run"
          status: pass
