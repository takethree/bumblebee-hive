      summary: "The normalized inventory tranche is complete. Hive now turns accepted Bumblebee batches into queryable package/finding/current-state data, exposes controlled operator inventory APIs/UI, preserves raw batches as source of truth, follows complete-run promotion semantics, and has local plus live proof."

