      - "Need to expose raw payloads, hostnames, usernames, SIDs, full source paths, project paths, object keys, secrets, HMAC material, or summary_json."
      - "Need to change Bumblebee scanner output semantics."
      - "Need destructive migration or data deletion."
      - "Verification fails twice for the same reason."
    receipt:
      result: done
      changed_files:
