          status: pass
        - cmd: "npx wrangler deploy --config wrangler.deploy.toml --dry-run"
          status: pass
        - cmd: "git diff --check"
          status: pass
      summary: "Implemented the local normalized inventory vertical slice: additive schema migration, NORMALIZE_QUEUE consumer, idempotent package/finding normalization, complete-run current-state promotion, controlled admin/UI package APIs, admin UI inventory surfaces, README docs, and regression tests for idempotence, promotion rules, deep profile behavior, UI auth, and data minimization."

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Apply and deploy the normalized inventory slice, then capture redacted live smoke evidence if credentials and pilot data are available."
    allowed_files:
