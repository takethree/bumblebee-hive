version: 2
goal:
  status: active
  title: Developer Rollout Readiness And Enrollment Wave Runbook
  slug: developer-rollout-readiness
  created_at: "2026-05-26"
  first_milestone_complete: false
  intake:
    original_request: "$goalbuddy:goal-prep"
    interpreted_outcome: "Prepare and execute a runbook-hardening slice for Bumblebee + Hive per-user developer rollout readiness."
    input_shape: existing_plan
    audience: "Hive operator and Windows developer pilot users"
    authority: approved
    proof_type: artifact
    completion_proof: "A linked, redacted, command-backed rollout runbook with release, installer, verifier, and sensitive-value receipts, plus passing checks for touched repos."
  oracle:
    signal: "A per-user developer can follow the documented v0.1.2 install and CheckOnly verification path using placeholders without hidden configuration or leaked local values."
    final_proof: "Final Judge receipt confirms docs, links, redaction checks, command checks, no live token rotation, no second-machine enrollment, and no compatibility-layer drift."
agents:
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed
visual_board:
  selected: local
  status: blocked
  url: null
  note: "Local board startup failed before serving a URL: goalbuddy catalog fetch returned HTTP 404. Generated board logs were not kept because the error stream included local machine paths."
rules:
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
active_task: T999
tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: done
    objective: "Validate the approved rollout-readiness runbook plan against current Hive and Bumblebee docs, release facts, installer/verifier behavior, and choose the exact Worker package."
    allowed_files:
      - "docs/goals/developer-rollout-readiness/state.yaml"
      - "docs/goals/developer-rollout-readiness/notes/**"
    verify:
      - "Read-only validation only: inspect current docs, release state, install script, verifier script, and prior goal facts needed to select the Worker package."
      - "Emit a Judge receipt with decision, current-state facts, exact Worker scope, allowed_files, verify commands, and stop_if conditions."
    stop_if:
      - "A live secret, raw token, raw device identifier, username, SID, hostname, full local profile path, or raw inventory payload would need to be printed or committed."
      - "The next step would rotate credentials, enroll a second machine, or change production Cloudflare Access policy."
      - "The Worker package would require Hive API, scanner, installer semantics, or Bumblebee collection changes without explicit Judge justification."
    receipt:
      result: done
      decision: proceed
      note: "See notes/T001-judge.md. The approved next package is docs-only: Hive rollout runbook, Hive README link, short generic Bumblebee deployment pointer, optional windows.md audit receipt, and redacted verification receipts."
  - id: T002
    type: worker
    assignee: Worker
    status: done
    objective: "Implement the validated rollout-readiness runbook package as the largest safe docs tranche."
    allowed_files:
      - "docs/developer-rollout-runbook.md"
      - "README.md"
      - "docs/goals/developer-rollout-readiness/state.yaml"
      - "docs/goals/developer-rollout-readiness/notes/**"
      - "../bumblebee/docs/deployment-windows.md"
      - "../bumblebee/windows.md"
    verify:
      - "gh release view v0.1.2 against the operator-owned Bumblebee fork, checking tagName,isDraft,isPrerelease,assets"
      - "PowerShell parser check for scripts/install-bumblebee.ps1 if referenced by the runbook."
      - "PowerShell parser check for scripts/verify-bumblebee-pilot.ps1 if referenced by the runbook."
      - "scripts/install-bumblebee.ps1 -WhatIf with placeholder per-user rollout values."
      - "scripts/verify-bumblebee-pilot.ps1 -Mode CheckOnly when local pilot state is available, or record the precise skipped condition."
      - "npm test"
      - "npm run typecheck"
      - "npm run lint"
      - "git diff --check in each touched repo."
      - "rg sensitive-value checks across touched docs and receipts."
    stop_if:
      - "A command would expose, commit, or print live Cloudflare Access client secret, enrollment token, Hive encryption key, admin token, raw device identifier, username, SID, hostname, full local profile path, or raw inventory payload."
      - "The work requires live token rotation, second-machine enrollment, or a production Cloudflare Access change."
      - "The work needs Hive API, scanner, scheduled-task behavior, installer semantics, or Bumblebee collection changes not approved by Judge."
    receipt:
      result: done
      changed_files:
        - "docs/developer-rollout-runbook.md"
        - "README.md"
        - "docs/goals/developer-rollout-readiness/state.yaml"
        - "docs/goals/developer-rollout-readiness/notes/T001-judge.md"
        - "docs/goals/developer-rollout-readiness/notes/T002-docs-verification.md"
        - "../bumblebee/docs/deployment-windows.md"
        - "../bumblebee/windows.md"
      commands:
        - cmd: "Release check for v0.1.2 assets"
          status: pass
        - cmd: "PowerShell parser checks for installer and verifier scripts"
          status: pass
        - cmd: "Installer -WhatIf with placeholder per-user rollout values"
          status: pass
        - cmd: "scripts/verify-bumblebee-pilot.ps1 -Mode CheckOnly"
          status: pass
        - cmd: "npm test"
          status: pass
        - cmd: "npm run typecheck"
          status: pass
        - cmd: "npm run lint"
          status: pass
        - cmd: "Sensitive-value searches across touched docs and receipts"
          status: pass
        - cmd: "git diff --check in Hive and Bumblebee"
          status: pass
      summary: "Added the Hive developer rollout runbook, linked it from Hive README, added a generic Bumblebee deployment pointer, and recorded a docs-only Windows compatibility-layer receipt. No live token rotation, second-machine enrollment, Hive API change, scanner change, installer semantic change, or scheduled-task behavior change was performed."
  - id: T003
    type: worker
    assignee: Worker
    status: done
    objective: "Run the full verification and publish package for the docs tranche, including redacted receipts and commit/push for touched repos if checks pass."
    allowed_files:
      - "docs/goals/developer-rollout-readiness/state.yaml"
      - "docs/goals/developer-rollout-readiness/notes/**"
      - "docs/developer-rollout-runbook.md"
      - "README.md"
      - "../bumblebee/docs/deployment-windows.md"
      - "../bumblebee/windows.md"
    verify:
      - "Repeat all Judge-approved verification commands from T002."
      - "Confirm touched repos have no unrelated changes mixed into the commit."
      - "Commit and push only changed repos with passing verification receipts."
    stop_if:
      - "Verification fails and cannot be corrected inside the Judge-approved docs scope."
      - "A repo contains unrelated dirty changes that would be included in the commit."
      - "Pushing would require credentials or remote changes outside the approved branch model."
    receipt:
      result: done
      changed_files:
        - "docs/goals/developer-rollout-readiness/state.yaml"
        - "docs/goals/developer-rollout-readiness/notes/T003-publish.md"
        - "docs/goals/developer-rollout-readiness/notes/T002-docs-verification.md"
        - "docs/goals/developer-rollout-readiness/notes/T001-judge.md"
        - "docs/developer-rollout-runbook.md"
        - "README.md"
        - "../bumblebee/docs/deployment-windows.md"
        - "../bumblebee/windows.md"
      commands:
        - cmd: "GoalBuddy state check before publish"
          status: pass
        - cmd: "Release check for v0.1.2 Windows assets"
          status: pass
        - cmd: "PowerShell parser checks for installer and verifier"
          status: pass
        - cmd: "Installer -WhatIf with placeholder per-user values"
          status: pass
        - cmd: "scripts/verify-bumblebee-pilot.ps1 -Mode CheckOnly"
          status: pass
        - cmd: "npm test"
          status: pass
        - cmd: "npm run typecheck"
          status: pass
        - cmd: "npm run lint"
          status: pass
        - cmd: "Sensitive-value searches across touched docs and receipts"
          status: pass
        - cmd: "git diff --check in Hive and Bumblebee"
          status: pass
      summary: "Repeated the verification set, confirmed no unrelated dirty files before staging, and prepared the Hive and Bumblebee docs changes for commit/push. A final hidden-file audit later removed generated board logs because the error stream included local machine paths."
  - id: T999
    type: judge
    assignee: Judge
    status: active
    objective: "Final audit: decide whether the full rollout-readiness oracle is satisfied and whether the goal can close."
    allowed_files:
      - "docs/goals/developer-rollout-readiness/state.yaml"
      - "docs/goals/developer-rollout-readiness/notes/**"
    verify:
      - "Review final changed files, redaction receipts, command receipts, and git status for all touched repos."
      - "Confirm no live token rotation, second-machine enrollment, scanner/API/installer semantic changes, or compatibility-layer drift occurred."
    stop_if:
      - "Any final proof is weak, missing, stale, or contains sensitive values."
      - "The docs cannot be followed by a per-user pilot operator without hidden configuration."
