# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Hive Inventory Grouping Preference"
  slug: "hive-inventory-grouping-preference"
  kind: existing_plan
  tranche: "Add a configurable Hive admin inventory grouping preference with package-family default, package+version mode, and observation troubleshooting mode."
  status: done
  oracle:
    signal: "The admin Inventory screen defaults to package-family grouping, shows version spread and total occurrences, persists the selected grouping in the browser, and explicit package+version plus observation modes still work."
    cadence: "after each Worker package and at final audit"
    final_proof: "Passing tests/typecheck/lint, Wrangler dry-runs, docs, data-minimization checks, and redacted live smoke evidence for package, summary, and observation package API modes."
  intake:
    original_request: "$goalbuddy:goal-prep after the package-family inventory grouping plan."
    interpreted_outcome: "Prepare a board to add configurable inventory grouping where the UI defaults to one row per package family while preserving version and observation detail."
    input_shape: existing_plan
    audience: "Hive operators and maintainers."
    authority: approved
    proof_type: test
    completion_proof: "Package APIs support view=package, UI defaults to package-family mode, operators can switch grouping modes, localStorage persists the choice, existing modes remain available, and verification proves no forbidden fields leak."
    likely_misfire: "Collapse versions into an ambiguous package-only row, or replace the current summary mode instead of adding a higher-level package-family mode."
    blind_spots_considered:
      - "Multiple versions of the same package are useful risk signal and must remain visible."
      - "The API default can remain view=summary for compatibility while the UI explicitly requests view=package."
      - "Observation rows remain valuable for troubleshooting and must not be deleted."
      - "Per-browser UI preference avoids adding server configuration in this tranche."
      - "Live proof should use aggregate counts and forbidden-field counts, not raw package lists."
    existing_plan_facts:
      - "Add API mode view=package."
      - "Keep view=summary as package+version grouping."
      - "Keep view=observations as row-level current observations."
      - "UI default is Package family."
      - "UI grouping preference is stored in localStorage."
      - "Package-family rows include version_count, total_occurrence_count, versions[], source category summaries, and latest observed time."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  selected: local
  local:
    status: blocked
    url: "http://goalbuddy.localhost:41737/hive-inventory-grouping-preference/"
    command: "npx goalbuddy board docs/goals/hive-inventory-grouping-preference"
    error: "Local board was not started during prep because npx goalbuddy board failed while fetching the GoalBuddy catalog with HTTP 404. File-backed board remains usable."

active_task: null

tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate the package-family grouping plan against the current uncommitted Hive inventory implementation, then choose the largest safe Worker package."
    inputs:
      - "docs/goals/hive-inventory-grouping-preference/goal.md"
      - "docs/goals/hive-inventory-grouping-preference/state.yaml"
      - "Current Hive repo, including uncommitted normalized-inventory and summary-view changes"
      - "Approved plan from chat"
      - "Previous completed board docs/goals/hive-inventory-summary-view/state.yaml"
    constraints:
      - "Read-only."
      - "Do not implement."
      - "Do not print raw payloads, live device IDs, package names from live data, hostnames, usernames, SIDs, source paths, project paths, object keys, secrets, HMAC material, or summary_json."
      - "Reject any approach that deletes observation data or changes Bumblebee scanner output semantics."
      - "Reject any approach that exposes raw path fields."
      - "Reject replacing view=summary if adding view=package can satisfy the outcome."
    expected_output:
      - "Decision: approve | revise | block"
      - "Current-state facts that materially affect implementation"
      - "Exact first Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
      - "Any task replacements needed before Worker execution"
    receipt:
      result: done
      decision: approve
      current_state_facts:
        - "The current uncommitted Hive implementation has view=summary and view=observations routed through adminPackagesData."
        - "view=summary currently groups by device_id, profile, ecosystem, normalized_name, and version."
        - "inventory_current includes the fields needed for package-family grouping and version detail: device/profile/ecosystem/package/version, source categories, direct/lifecycle flags, run_id, and observed_at."
        - "The admin UI package table currently calls package APIs without an explicit view, so API default remains important for compatibility."
        - "No schema migration, raw observation deletion, or Bumblebee scanner change is needed."
      exact_first_worker_objective: "Implement a full local package-family grouping preference package: add API view=package, keep view=summary and view=observations intact, default the admin UI to package-family mode with a segmented grouping control persisted in localStorage, render version details clearly, update docs, and verify with tests plus dry-runs."
      allowed_files:
        - "src/index.ts"
        - "test/ingest.test.ts"
        - "public/admin/index.html"
        - "public/admin/app.js"
        - "public/admin/styles.css"
        - "README.md"
        - "docs/goals/hive-inventory-grouping-preference/state.yaml"
        - "docs/goals/hive-inventory-grouping-preference/notes"
      verify:
        - "npm test"
        - "npm run typecheck"
        - "npm run lint"
        - "node --check public/admin/app.js"
        - "npx wrangler deploy --config wrangler.toml --dry-run"
        - "npx wrangler deploy --config wrangler.deploy.toml --dry-run"
        - "git diff --check"
        - "GoalBuddy state checker"
      stop_if:
        - "Need files outside allowed_files."
        - "Need to expose raw payloads, live package names in receipts, hostnames, usernames, SIDs, full source paths, project paths, object keys, secrets, HMAC material, or summary_json."
        - "Need to delete observation data or change Bumblebee scanner output semantics."
        - "Need destructive migration or data deletion."
        - "Need to remove or weaken view=summary or view=observations."
        - "Verification fails twice for the same reason."
      summary: "Approved the plan as one bounded useful local vertical slice. The existing normalized current-state table can support package-family grouping with version detail without schema or scanner changes."

