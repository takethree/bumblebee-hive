name = "bumblebee-hive"
main = "src/index.ts"
compatibility_date = "2026-05-26"

[[r2_buckets]]
binding = "RAW_BATCHES"
bucket_name = "bumblebee-hive-raw"

[[d1_databases]]
binding = "DB"
database_name = "bumblebee-hive"
database_id = "00000000-0000-0000-0000-000000000000"

[[queues.producers]]
binding = "NORMALIZE_QUEUE"
queue = "bumblebee-hive-normalize"
